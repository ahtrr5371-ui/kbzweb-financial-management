name: financial-management
services:
- name: api
  github:
    repo: ahtrr5371-ui/kbzweb-financial-management
    branch: master
  build_command: npm install --production
  dockerfile_path: Dockerfile.backend
  source_dir: .
  http_port: 5000
  envs:
  - key: NODE_ENV
    value: production
  - key: DATABASE_URL
    value: ${db.connection_string}
  - key: PORT
    value: "5000"
  - key: ALLOWED_ORIGINS
    value: https://${web.domain}
  - key: MAX_FILE_SIZE
    value: "10485760"
  health_check:
    http_path: /api/transactions
  http_port: 5000
  instance_count: 1
  instance_size_slug: basic-s

- name: web
  github:
    repo: ahtrr5371-ui/kbzweb-financial-management
    branch: master
  build_command: npm install && npm run build
  dockerfile_path: Dockerfile.frontend
  source_dir: .
  http_port: 80
  envs:
  - key: API_URL
    value: https://${api.domain}/api
  health_check:
    http_path: /
  instance_count: 1
  instance_size_slug: basic-s

databases:
- name: db
  engine: PG
  version: "14"
  production: true
