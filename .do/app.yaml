name: financial-management-app
region: sgp

databases:
  - name: financial-db
    engine: PG
    production: false
    version: "14"

services:
  # Backend API Service
  - name: api
    github:
      branch: master
      deploy_on_push: true
      repo: ahtrr5371-ui/kbzweb-financial-management
    source_dir: /backend
    build_command: npm install --production=false && npx prisma generate
    run_command: npm start
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-s
    http_port: 5000
    routes:
      - path: /api
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: ${financial-db.DATABASE_URL}
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: PORT
        scope: RUN_AND_BUILD_TIME
        value: "5000"
    health_check:
      http_path: /api/transactions
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 5
      failure_threshold: 5

  # Frontend Service
  - name: web
    type: static
    github:
      branch: master
      deploy_on_push: true
      repo: ahtrr5371-ui/kbzweb-financial-management
    source_dir: /frontend
    build_command: npm install && npm run build
    output_dir: dist
    routes:
      - path: /
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: ${api.PUBLIC_URL}

jobs:
  # Database Migration Job
  - name: db-migrate
    github:
      branch: master
      deploy_on_push: true
      repo: ahtrr5371-ui/kbzweb-financial-management
    source_dir: /backend
    kind: PRE_DEPLOY
    run_command: npx prisma migrate deploy
    environment_slug: node-js
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: ${financial-db.DATABASE_URL}
