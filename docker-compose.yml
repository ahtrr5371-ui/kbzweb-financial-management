version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: financial-db
    environment:
      POSTGRES_DB: financial_management
      POSTGRES_USER: finapp_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-your_strong_password_here}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - finapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finapp_user -d financial_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financial-api
    environment:
      DATABASE_URL: postgresql://finapp_user:${DB_PASSWORD:-your_strong_password_here}@postgres:5432/financial_management?schema=public
      NODE_ENV: production
      PORT: 5000
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      MAX_FILE_SIZE: 10485760
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - finapp-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: financial-web
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - finapp-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  finapp-network:
    driver: bridge
